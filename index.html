    <title>Habit Tracker</title>
</head>
<body>
    <main>
        <section class="left-section">
            <form id="habits-form">
                <input type="text" id="habit-name" placeholder="Hábito a desarrollar">
                <select name="category" id="habit-category">
                    <option value="">Selecciona una categoría</option>   
                    <option value="salud">Salud</option>
                    <option value="estudio">Estudio</option>
                    <option value="trabajo">Trabajo</option>
                    <option value="red-social">Redes Sociales</option>
                    <option value="distracciones">Distracciones</option>
                    <option value="hobbies">Hobbies</option>
                </select>
                <input type="number" id="habit-time" placeholder="Duración (minutos)">
                <select name="type" id="habit-type">
                    <option value="bueno">Bueno</option>
                    <option value="malo">Malo</option>
                </select>

                <div class="button-group" type="submit">
                    <button class="darkmatter-btn" id="submit">Agregar Hábito
                        <div
                        class="darkmatter-particle"
                        style="--tx: -20px; --ty: -15px; left: 25%; top: 25%;"
                        ></div>
                        <div
                        class="darkmatter-particle"
                        style="--tx: 15px; --ty: -20px; left: 75%; top: 25%; animation-delay: 0.2s;"
                        ></div>
                        <div
                        class="darkmatter-particle"
                        style="--tx: -15px; --ty: 15px; left: 25%; top: 75%; animation-delay: 0.4s;"
                        ></div>
                        <div
                        class="darkmatter-particle"
                        style="--tx: 20px; --ty: 15px; left: 75%; top: 75%; animation-delay: 0.6s;"
                        ></div>
                    </button>
                </div>

            </form>
            <form id="non-negotiables-form">
                <input type="text" id="nn-input" placeholder="Hábito No Negociable">

                <div class="button-group" id="submit">
                    <button class="darkmatter-btn" id="submit">Añadir
                        <div
                        class="darkmatter-particle"
                        style="--tx: -20px; --ty: -15px; left: 25%; top: 25%;"
                        ></div>
                        <div
                        class="darkmatter-particle"
                        style="--tx: 15px; --ty: -20px; left: 75%; top: 25%; animation-delay: 0.2s;"
                        ></div>
                        <div
                        class="darkmatter-particle"
                        style="--tx: -15px; --ty: 15px; left: 25%; top: 75%; animation-delay: 0.4s;"
                        ></div>
                        <div
                        class="darkmatter-particle"
                        style="--tx: 20px; --ty: 15px; left: 75%; top: 75%; animation-delay: 0.6s;"
                        ></div>
                    </button>
                </div>

            </form>
            <ul id="habits-list"></ul>
        </section>
        <section class="right-section">
            <div class="days-nav">
                <button class="day active">Lunes</button>
                <button class="day">Martes</button>
                <button class="day">Miercoles</button>
                <button class="day">Jueves</button>
                <button class="day">Viernes</button>
                <button class="day">Sabado</button>
                <button class="day">Domingo</button>
            </div>
            <div class="chart-card">
                <h3>Buenos</h3>
                <canvas id="positive-chart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Malos</h3>
                <canvas id="negative-chart"></canvas>
            </div>
            <div class="summary-card">
                <h3>Resumen</h3>
                <div class="progress-container">
                    <div id="progress-fill"></div>
                </div>
                <div id="summary"></div>  
            </div>
            <div class="chart-card">
                <h3>Hábitos Más Frecuentes</h3>
                <canvas id="top-habits-chart"></canvas>
            </div> 
            <div id="non-negotiables-panel">
                <h3>Hábitos No Negociables</h3>
                <ul id="non-negotiables-list"></ul>
                <div id="nn-in-progress"></div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
