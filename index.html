<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <section class="left-section">
            <form id="habits-form">
                <input type="text" id="habit-name" placeholder="Hábito a desarrollar">
                <select name="category" id="habit-category">
                    <option value="">Selecciona una categoría</option>   
                    <option value="salud">Salud</option>
                    <option value="estudio">Estudio</option>
                    <option value="trabajo">Trabajo</option>
                    <option value="red-social">Redes Sociales</option>
                    <option value="distracciones">Distracciones</option>
                    <option value="hobbies">Hobbies</option>
                </select>
                <input type="number" id="habit-time" placeholder="Duración (minutos)">
                <select name="type" id="habit-type">
                    <option value="bueno">Bueno</option>
                    <option value="malo">Malo</option>
                </select>
                <button type="submit">Agregar Hábito</button>
            </form>
            <form id="non-negotiables-form">
                <input type="text" id="nn-input" placeholder="Hábito No Negociable">
                <button id="submit">Añadir</button>
            </form>
            <ul id="habits-list"></ul>
        </section>
        <section class="right-section">
            <div class="chart-card">
                <h3>Buenos</h3>
                <canvas id="positive-chart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Malos</h3>
                <canvas id="negative-chart"></canvas>
            </div>
            <div class="summary-card">
                <h3>Resumen</h3>
                <div class="progress-container">
                    <div id="progress-fill"></div>
                </div>
                <div id="summary"></div>  
            </div>    
            <div id="non-negotiables-panel">
                <h3>Hábitos No Negociables</h3>
                <ul id="non-negotiables-list"></ul>
                <div id="nn-in-progress"></div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
